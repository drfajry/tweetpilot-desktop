<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ناشر</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070b14;color:#e8eaf0;font-family:'Segoe UI',Tahoma,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#0d1421;border-bottom:1px solid #1d9bf033;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1d9bf0,#0a4a8a);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-t{font-size:17px;font-weight:700;color:#fff}
.logo-s{font-size:10px;color:#1d9bf0}
.steps{display:flex;gap:5px}
.sp{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a2540;color:#6b7280;cursor:default}
.sp.active{background:#1d9bf0;border-color:#1d9bf0;color:#fff}
.sp.done{border-color:#1d9bf055;color:#1d9bf0;cursor:pointer}
.sp-n{width:16px;height:16px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;background:#222;color:#6b7280;flex-shrink:0}
.sp.active .sp-n{background:#fff;color:#1d9bf0}
.sp.done .sp-n{background:#1d9bf0;color:#fff}
.hdr-r{display:flex;align-items:center;gap:8px}
.ubadge{display:flex;align-items:center;gap:7px;padding:5px 12px;background:#111827;border:1px solid #1d9bf033;border-radius:20px}
.uname{font-size:12px;color:#aaa}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 20px 40px;max-width:860px;margin:0 auto;width:100%;scrollbar-width:thin;scrollbar-color:transparent transparent}
.main:hover{scrollbar-color:#1a2540 transparent}
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:transparent;border-radius:4px;transition:background .3s}
.main:hover::-webkit-scrollbar-thumb{background:#1a2540}
.main::-webkit-scrollbar-thumb:hover{background:#2a3550}
.cs{display:flex;flex-direction:column;align-items:center;justify-content:center;height:65vh;text-align:center;gap:16px}
.cs-ic{font-size:72px}
.cs-t{font-size:26px;font-weight:700;color:#fff}
.cs-s{font-size:14px;color:#6b7280;max-width:360px;line-height:1.7}
.btn{width:100%;padding:12px;border:none;border-radius:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-p{background:linear-gradient(135deg,#1d9bf0,#0d6efd)}
.btn-p:hover:not(:disabled){transform:translateY(-1px)}
.btn-pu{background:linear-gradient(135deg,#7c3aed,#1d9bf0)}
.btn-g{background:#111827;border:1px solid #1a2540;color:#6b7280}
.btn-big{padding:14px 36px;width:auto;border-radius:14px;font-size:16px;background:linear-gradient(135deg,#1d9bf0,#0d6efd);border:none;color:#fff;cursor:pointer;font-family:inherit;font-weight:700}
.btn-sm{padding:6px 14px;width:auto;border-radius:8px;font-size:12px}
.btn-copy{background:linear-gradient(135deg,#00c896,#0d9488);font-size:15px;padding:14px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.card{background:#111827;border:1px solid #1a2540;border-radius:14px;padding:20px;margin-bottom:16px}
.ct{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:14px}
label{display:block;font-size:13px;color:#9aa;margin-bottom:5px;font-weight:500}
input,textarea{width:100%;padding:10px 13px;background:#0a0f1a;border:1px solid #1a2540;border-radius:9px;color:#e8eaf0;font-size:13px;outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:#1d9bf0}
.f{margin-bottom:14px}
.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #1a2540;color:#6b7280;cursor:pointer;background:transparent;font-family:inherit}
.tab.active{background:#1d9bf0;border-color:#1d9bf0;color:#fff}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.tc{padding:12px 14px;border-radius:11px;cursor:pointer;background:#0d1421;border:2px solid #1a2540;transition:all .2s}
.tc:hover{border-color:#1d9bf033}
.tc.sel{background:#0c2d4a;border-color:#1d9bf0}
.tn{font-size:13px;font-weight:700;color:#ccd}
.tc.sel .tn{color:#1d9bf0}
.tv{font-size:11px;color:#6b7280;margin-top:2px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pc{padding:10px 12px;border-radius:10px;cursor:pointer;background:#0d1421;border:2px solid #1a2540;transition:all .2s}
.pc:hover{border-color:#1d9bf033}
.pc.sel{border-color:#1d9bf0;background:#0c2d4a}
.pn{font-size:12px;font-weight:600;color:#e0e0e0;line-height:1.4}
.pm{font-size:11px;color:#6b7280;margin-top:3px}
.tones{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tone{padding:9px 12px;border-radius:9px;font-size:13px;background:#0d1421;border:2px solid #1a2540;color:#6b7280;cursor:pointer;font-family:inherit;text-align:center}
.tone.active{background:#1d9bf011;border-color:#1d9bf0;color:#1d9bf0;font-weight:600}
.tbox{background:#0a0f1a;border:1px solid #1d9bf033;border-radius:11px;padding:13px;margin-bottom:12px}
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tlbl{font-size:12px;color:#1d9bf0;font-weight:600}
.tcc{font-size:11px;font-weight:700}
.lbar{width:100%;height:3px;background:#1a2540;border-radius:2px;overflow:hidden;margin-top:8px}
.lfill{height:100%;background:linear-gradient(90deg,#7c3aed,#1d9bf0);animation:sl 1.4s infinite;width:35%}
@keyframes sl{0%{transform:translateX(-200%)}100%{transform:translateX(500%)}}
.ptit{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.psub{font-size:13px;color:#6b7280;margin-bottom:20px}
.sched-table{width:100%;border-collapse:collapse;font-size:12px}
.sched-table th{text-align:right;padding:8px 10px;color:#6b7280;border-bottom:1px solid #1a2540;font-weight:600}
.sched-table td{padding:9px 10px;border-bottom:1px solid #0d1421;vertical-align:top}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.badge-saved{background:#7c3aed22;color:#a78bfa}
.char-warn{background:#ff44440d;border:1px solid #ff444433;border-radius:9px;padding:10px 13px;font-size:12px;color:#ff8080;margin-bottom:10px}
.char-ok{background:#00c8960d;border:1px solid #00c89633;border-radius:9px;padding:8px 13px;font-size:12px;color:#00c896}
.real-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;background:#00c89622;color:#00c896;border:1px solid #00c89633;margin-right:6px}
.err-box{background:#ff44440d;border:1px solid #ff444433;border-radius:9px;padding:14px;font-size:12px;color:#ff8080;margin-bottom:14px;line-height:1.8}
.seo-res-box{background:#0a0f1a;border:1px solid #1a2540;border-radius:9px;padding:12px;font-size:13px;cursor:pointer;transition:border-color .2s,background .2s}
.seo-res-box:hover{border-color:#1d9bf0}
.succ-copy{text-align:center;padding:40px 20px}
.succ-ic{font-size:60px;margin-bottom:14px}
.succ-t{font-size:20px;color:#00c896;font-weight:700;margin-bottom:6px}
.succ-b{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.saved-card{background:#0d1421;border:1px solid #1a2540;border-radius:11px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.saved-text{font-size:13px;line-height:1.7;flex:1;white-space:pre-wrap;word-break:break-word}
.saved-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #ffffff33;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* toggle switch */
.tog{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .2s,right .2s}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-15px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <div class="logo-ic" style="background:linear-gradient(180deg,#101620,#00b296);display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="width:64%;height:64%"><path d="M 122 268 A 134 134 0 1 0 390 268" fill="none" stroke="#ffffff" stroke-width="54" stroke-linecap="round"/><circle cx="256" cy="196" r="30" fill="#ffffff"/><path d="M 209 149 A 66 66 0 0 1 303 149" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".85"/><path d="M 176 116 A 113 113 0 0 1 336 116" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".55"/><path d="M 143 83 A 160 160 0 0 1 369 83" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".3"/></svg></div>

<script>
const S={
  user:null, step:0, page:'compose',
  region:'sa', platform:'x', trends:[], selTrends:[], trendsReal:false, trendsError:'',
  customTags:'',
  bsSrc:'amazon', products:[], prodSearch:'',
  mode:'general', // free | general | marketing
  afUrl:'', prodDesc:'', prodImages:[], storeImages:[], noonCode:'', tone:'hype', category:'',
  tweet:'', saved:[],
  copySuccess:false, postResult:null,
};

const REGIONS=[{k:'sa',l:'🇸🇦 السعودية'},{k:'world',l:'🌍 العالم'},{k:'ae',l:'🇦🇪 الإمارات'},{k:'eg',l:'🇪🇬 مصر'}];
const TONES=[{id:'hype',l:'🔥 إثارة'},{id:'informative',l:'📊 معلوماتي'},{id:'funny',l:'😂 فكاهي'},{id:'urgency',l:'⚡ عاجل'}];
const STEPS=['الترندات','التغريدة','الحفظ'];
const SRCS=[{k:'amazon',l:'📦 أمازون'},{k:'noon',l:'🛍️ نون'},{k:'aliexpress',l:'🌐 علي إكسبريس'}];

const SUPPORT_WHATSAPP = '966559099222';
const SUPPORT_MSG_BUY  = 'مرحباً، أريد شراء برنامج ناشر 🚀';
const SUPPORT_MSG_HELP = 'مرحباً، أحتاج مساعدة في برنامج ناشر';
// إصلاح خلل Electron: alert يجمّد حقول الإدخال — نعيد تركيز النافذة بعد كل تنبيه
const _nativeAlert = window.alert;
window.alert = (msg) => { _nativeAlert(msg); setTimeout(() => window.api.refocusWindow?.(), 30); };

const X_DM_URL = 'https://x.com/messages/compose?recipient_id=2051302166883606529';
function openXDM(){ window.api.openExternal(X_DM_URL); }
const PAYMENT_INFO = {
  stc:   '0500043462',
  urpay: '0500043462',
  bank:  { iban: 'SA7980000044060801614001', account: '44000000100060861400012' },
  price: 49,
};

// FIX #4: واتساب وX يفتحان في المتصفح الخارجي
function openWhatsApp(msg){ window.api.openExternal(`https://wa.me/${SUPPORT_WHATSAPP}?text=${encodeURIComponent(msg)}`); }
function openX(){ window.api.openExternal('https://twitter.com/intent/tweet'); }
function openXWith(text){ window.api.openExternal('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)); }

function buildOrderMsg(data){
  return `🛒 طلب شراء — ناشر\n\n` +
    `الاسم: ${data.name}\n` +
    `الجوال: ${data.phone}\n` +

}


async function init(){
  // اعرض شاشة تحميل أثناء التحقق (قد يستغرق وقتاً لو السيرفر نائم)
  document.getElementById('app').innerHTML = `<div class="cs">
    <div class="cs-ic" style="background:linear-gradient(180deg,#101620,#00b296);width:88px;height:88px;border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="width:64%;height:64%"><path d="M 122 268 A 134 134 0 1 0 390 268" fill="none" stroke="#ffffff" stroke-width="54" stroke-linecap="round"/><circle cx="256" cy="196" r="30" fill="#ffffff"/><path d="M 209 149 A 66 66 0 0 1 303 149" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".85"/><path d="M 176 116 A 113 113 0 0 1 336 116" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".55"/><path d="M 143 83 A 160 160 0 0 1 369 83" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".3"/></svg></div>
    <div class="cs-t">ناشر</div>
    <div style="margin-top:16px"><span class="spin"></span> <span style="color:#6b7280">جاري التحقق من الاشتراك...</span></div>
  </div>`;
  renderHdr();

  // تحقق من الترخيص
  const lic = await window.api.checkLicense();
  if (!lic.valid) {
    if (lic.reason === 'no_connection') {
      document.getElementById('app').innerHTML = renderNoConnection();
    } else if (lic.reason === 'other_device') {
      document.getElementById('app').innerHTML = renderOtherDevice();
      bindLicense();
    } else {
      document.getElementById('app').innerHTML = renderLicense();
      bindLicense();
    }
    renderHdr();
    return;
  }
  S.user = await window.api.getAuth();
  try { const st = await window.api.getSettings(); if(st && st.noonCode) S.noonCode = st.noonCode; } catch(e) {}
  if (lic.grace) {
    // وضع السماح: الخادم غير متاح لكن العميل ضمن مهلة 7 أيام
    setTimeout(() => {
      const b = document.createElement('div');
      b.style.cssText = 'position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:997;background:#f59e0b18;border:1px solid #f59e0b44;color:#f59e0b;border-radius:10px;padding:8px 16px;font-size:12px;max-width:90%';
      b.textContent = `⚠️ تعذّر الوصول لخادم التحقق — تعمل في وضع غير متصل (متبقٍّ ${lic.graceDaysLeft} ${lic.graceDaysLeft===1?'يوم':'أيام'}). تأكد من اتصالك قريباً.`;
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 12000);
    }, 800);
  }
  // استقبال إشعار التحديث
  window.api.onUpdateAvailable(data => { S.updateAvailable=data; showUpdateBanner(data); });
  loadSaved();
  render();
}

function renderOtherDevice(){
  return `<div class="cs">
    <div class="cs-ic">🔒</div>
    <div class="cs-t">الكود مستخدم على جهاز آخر</div>
    <div class="cs-s">هذا الكود مفعّل بالفعل على جهاز آخر. كل كود يعمل على جهاز واحد فقط. للاستخدام على هذا الجهاز، تواصل معنا أو أدخل كوداً جديداً.</div>
    <div style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;margin-top:8px">
      <input id="licInput" placeholder="XXXXX-XXXXX-XXXXX" style="text-align:center;font-size:16px;letter-spacing:2px;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
      <button class="btn-big" id="btnActivate" style="width:100%">✅ تفعيل كود جديد</button>
      <div id="licError" style="color:#ff8080;font-size:13px;text-align:center"></div>
      <button class="btn-big" style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706)" onclick="showPaymentPage()">
        🛒 اشترك الآن — ${PAYMENT_INFO.price} ريال/سنة
      </button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-g" style="flex:1;padding:11px" onclick="openWhatsApp(SUPPORT_MSG_HELP)" >💬 واتساب</button>
        <button class="btn btn-g" style="flex:1;padding:11px;color:#1d9bf0;border-color:#1d9bf0" onclick="openXDM()">✉️ خاص إكس</button>
      </div>
    </div>
  </div>`;
}

function renderNoConnection(){
  return `<div class="cs">
    <div class="cs-ic">📡</div>
    <div class="cs-t">يتطلب اتصال بالإنترنت</div>
    <div class="cs-s">ناشر يحتاج اتصالاً بالإنترنت للتحقق من اشتراكك عند كل تشغيل. تأكد من اتصالك ثم أعد فتح التطبيق.</div>
    <button class="btn-big" style="width:auto;margin-top:8px" onclick="location.reload()">🔄 إعادة المحاولة</button>
  </div>`;
}

function renderLicense(){
  return `<div class="cs">
    <div class="cs-ic" style="background:linear-gradient(180deg,#101620,#00b296);width:88px;height:88px;border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="width:64%;height:64%"><path d="M 122 268 A 134 134 0 1 0 390 268" fill="none" stroke="#ffffff" stroke-width="54" stroke-linecap="round"/><circle cx="256" cy="196" r="30" fill="#ffffff"/><path d="M 209 149 A 66 66 0 0 1 303 149" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".85"/><path d="M 176 116 A 113 113 0 0 1 336 116" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".55"/><path d="M 143 83 A 160 160 0 0 1 369 83" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".3"/></svg></div>
    <div class="cs-t">ناشر</div>
    <div class="cs-s">نشرك أذكى على مواقع التواصل الاجتماعي</div>
    <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px">
      <input id="licInput" placeholder="XXXXX-XXXXX-XXXXX" style="text-align:center;font-size:16px;letter-spacing:2px;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
      <button class="btn-big" id="btnActivate" style="width:100%">✅ تفعيل الكود</button>
      <div id="licError" style="color:#ff8080;font-size:13px;text-align:center"></div>
      <div style="border-top:1px solid #1a2540;margin:4px 0"></div>
      <button class="btn-big" style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706)" onclick="showPaymentPage()">
        🛒 اشترك الآن — ${PAYMENT_INFO.price} ريال/سنة
      </button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-g" style="flex:1;padding:11px" onclick="openWhatsApp(SUPPORT_MSG_HELP)">💬 واتساب</button>
        <button class="btn btn-g" style="flex:1;padding:11px;color:#1d9bf0;border-color:#1d9bf0" onclick="openXDM()">✉️ خاص إكس</button>
      </div>
    </div>
  </div>`;
}
function bindLicense(){
  document.getElementById('btnActivate')?.addEventListener('click', activateLicense);
  document.getElementById('licInput')?.addEventListener('keydown', e=>{ if(e.key==='Enter') activateLicense(); });
}
async function activateLicense(){
  const code = document.getElementById('licInput')?.value?.trim();
  if (!code) return;
  const btn = document.getElementById('btnActivate');
  const err = document.getElementById('licError');
  btn.disabled=true; btn.textContent='⏳ جاري التحقق...';
  err.textContent='';
  const result = await window.api.verifyLicense(code);
  if (result.valid) {
    btn.textContent='✅ تم التفعيل!';
    setTimeout(()=>{ S.licensed=true; init(); }, 800);
  } else {
    err.textContent = '❌ ' + (result.error || 'كود غير صحيح');
    btn.disabled=false; btn.textContent='✅ تفعيل';
  }
}

// ── صفحة SEO يوتيوب ──────────────────────────────
const SEO_STATE = {
  title:'', afUrl:'', trends:[], selTrend:null,
  vtype:'entertainment',
  result:null, loading:false,
};

function renderSeoPage(){
  const r = SEO_STATE.result;
  const VTYPES = [
    {id:'entertainment', l:'😂 ترفيهي / مضحك'},
    {id:'review',        l:'⭐ مراجعة منتج'},
    {id:'tutorial',      l:'📚 تعليمي / شرح'},
    {id:'vlog',          l:'📹 مدوّنة (فلوق)'},
    {id:'gaming',        l:'🎮 ألعاب'},
    {id:'cooking',       l:'🍳 طبخ'},
  ];
  const needsLink = ['review'].includes(SEO_STATE.vtype);
  return `<div class="ptit">📈 تحسين يوتيوب (SEO)</div>
  <div class="psub">اختر نوع الفيديو واكتب العنوان — كل نوع له وصف مختلف تماماً</div>

  <div class="card">

function bindSeoPage(){
  document.getElementById('seoTitle')?.addEventListener('input', e => SEO_STATE.title = e.target.value);
  document.getElementById('seoAfUrl')?.addEventListener('input', e => SEO_STATE.afUrl = e.target.value);
  document.getElementById('btnSeoTrends')?.addEventListener('click', async () => {
    const btn = document.getElementById('btnSeoTrends');
    btn.disabled=true; btn.textContent='⏳...';
    const r = await window.api.fetchTrends({ region: 'sa', platform: 'youtube' });
    if(r.success) SEO_STATE.trends = r.trends;
    btn.disabled=false; btn.textContent='🔄 جلب الترندات';
    render();
  });
  document.getElementById('btnGenSeo')?.addEventListener('click', generateSeo);
}

window.selectSeoTrend = (i) => {
  SEO_STATE.selTrend = SEO_STATE.selTrend === i ? null : i;
  render();
};

async function generateSeo(){
  const title = document.getElementById('seoTitle')?.value?.trim() || SEO_STATE.title;
  const afUrl = document.getElementById('seoAfUrl')?.value?.trim() || SEO_STATE.afUrl;
  if(!title){ alert('أدخل عنوان الفيديو أولاً'); return; }
  SEO_STATE.title = title;
  SEO_STATE.afUrl = afUrl;
  SEO_STATE.loading = true;
  render();

  const trend = SEO_STATE.selTrend !== null ? (SEO_STATE.trends[SEO_STATE.selTrend]?.title || '') : '';
  const trendLine = trend ? `\n🔥 من وحي ترند: ${trend}\n` : '';
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const sub = pick([
    '👍 إذا أعجبك الفيديو اضغط لايك واشترك في القناة وفعّل الجرس 🔔',

    review: ['💬 هل جربت هذا المنتج؟ شاركنا رأيك في التعليقات','🤔 وش أهم شي تدور عليه في هالمنتج؟ خبرني بالتعليق','💬 عندك سؤال عن المنتج؟ اسأل وأجاوبك'],
    tutorial: ['💬 لو عندك سؤال اكتبه في التعليقات وراح أساعدك','📝 وش الشرح اللي تبيه الجاي؟ اقترح بالتعليقات','💬 وصلت لأي خطوة؟ خبرني إذا واجهتك مشكلة'],
    vlog: ['💬 وش رأيك في يومي؟ خبّرني في التعليقات','📹 ودك أصور فلوق عن إيش؟ اكتب اقتراحك','💬 شاركني أجمل لحظة في يومك أنت بعد!'],
    gaming: ['🎮 وش اللعبة اللي تبي ألعبها الجاية؟ اكتبها بالتعليق','🕹️ وصلت لهالمرحلة؟ خبرني كيف عديتها','🎮 تتوقع أفوز الجولة الجاية؟ توقعك بالتعليقات'],
    cooking: ['🍽️ جربت الوصفة؟ صوّرها وشاركنا النتيجة في التعليقات','👩‍🍳 وش الوصفة اللي تبيها الجاية؟ اقترح بالتعليق','🍽️ عندك لمسة خاصة على هالوصفة؟ شاركنا إياها'],
  };
  const askLine = pick(ASK[SEO_STATE.vtype] || ['💬 شاركنا رأيك في التعليقات']);
  const sep = '━━━━━━━━━━━━━━━━━━━━';

  let seoTitle = '', desc = '', tags = '';

  if (SEO_STATE.vtype === 'entertainment') {

      `${sep}\n${askLine}\n${sub}\n\n` +
      pick([`#ترفيه #كوميديا #ضحك #مقاطع_مضحكة`, `#ضحك #فله #مقاطع #ترند`, `#كوميديا #تحشيش #ضحك_بلا_حدود`]);
    tags = `${title}, مقاطع مضحكة, كوميديا, ترفيه, ضحك, فكاهة, تحشيش, مقاطع ترند, ${trend||'منوعات'}`;
  }
  else if (SEO_STATE.vtype === 'review') {

    desc = pick([`⭐ مراجعة شاملة وصادقة لـ ${title}\n\nفي هذا الفيديو أشاركك تجربتي الحقيقية — المميزات والعيوب قبل ما تشتري.`,
                 `🔍 ${title} تحت المجهر!\n\nتجربة استخدام حقيقية بدون مجاملات — كل اللي تحتاج تعرفه قبل الشراء.`,

    desc = pick([`📚 في هذا الفيديو نشرح ${title} بطريقة سهلة وواضحة\n\nتابع الخطوات معي وراح تتعلم بسهولة 👍`,

      `${sep}\n📌 ما ستتعلمه:\n` +
      `• الأساسيات\n• الخطوات العملية\n• نصائح مهمة\n• أخطاء شائعة تتجنبها\n\n` +
      `${sep}\n${askLine}\n${sub}\n\n` +
      `#شرح #تعليم #${title.split(' ')[0]} #خطوة_بخطوة`;
    tags = `كيف ${title}, شرح ${title}, تعليم, طريقة, دليل, للمبتدئين, خطوة بخطوة, ${trend||'تعليمي'}`;

  else if (SEO_STATE.vtype === 'vlog') {

    desc = `📹 ${title}\n\n` +
      pick([`يومياتي وتجاربي أشاركها معكم 💛\nرافقوني في هذا اليوم!`,
            `أخذتكم معي خطوة بخطوة 🎬\nأتمنى تستمتعون بالفلوق!`,
            `يوم مليان لحظات حلوة 💛\nخلوني أشارككم التفاصيل!`]) + ` ${trendLine}\n` +
      `${sep}\n${askLine}\n${sub}\n\n` +
      `#فلوق #يوميات #vlog #حياتي`;
    tags = `${title}, فلوق, يوميات, vlog, يوم في حياتي, فلوقات, ${trend||'منوعات'}`;

window.copySection = async (id) => {
  const el = document.getElementById(id);
  if(!el) return;
  await window.api.copyToClipboard(el.innerText);
  el.style.borderColor = '#00c896';
  el.style.background = '#00c89608';
  setTimeout(()=>{ el.style.borderColor='#1a2540'; el.style.background='#0a0f1a'; }, 1500);
};

async function copyAllSeo(){
  const r = SEO_STATE.result;
  if(!r) return;
  const all = `العنوان:\n${r.title}\n\n${'━'.repeat(20)}\nالوصف:\n${r.description}\n\n${'━'.repeat(20)}\nالوسوم:\n${r.tags}`;
  await window.api.copyToClipboard(all);
  alert('✅ تم نسخ كل المحتوى');
}

function bindSchedulePage(){
  document.getElementById('schedNewTweet')?.addEventListener('input', e => SCHED_STATE.newTweet = e.target.value);

  document.getElementById('btnAddTweet')?.addEventListener('click', ()=>{
    const text = document.getElementById('schedNewTweet')?.value?.trim();
    if(!text){ alert('اكتب تغريدة أولاً'); return; }
    if(text.length > 280){ alert(`التغريدة تتجاوز 280 حرفاً (${text.length})`); return; }
    SCHED_STATE.tweets.push(text);
    SCHED_STATE.newTweet = '';
    render();
  });

  document.getElementById('btnAddFromSaved')?.addEventListener('click', ()=>{
    if(S.saved.length === 0){ alert('لا توجد تغريدات محفوظة'); return; }
    openSavedPicker();
  });

  document.getElementById('btnSmartSchedule')?.addEventListener('click', async ()=>{
    if(SCHED_STATE.tweets.length === 0){ alert('أضف تغريدات أولاً'); return; }
    SCHED_STATE.loading = true;
    render();
    // التاريخ المختار (أو اليوم) — يُفسَّر بالتوقيت المحلي
    const startDate = SCHED_STATE.startDate ? new Date(SCHED_STATE.startDate + 'T00:00:00') : new Date();
    startDate.setHours(0,0,0,0);
    const r = await window.api.smartSchedule({
      tweets: SCHED_STATE.tweets,
      dailyCount: SCHED_STATE.dailyCount,
      startDate: startDate.toISOString(),
    });
    if(r.success){
      SCHED_STATE.tweets = [];
      SCHED_STATE.newTweet = '';
      await loadScheduledList();
    } else {
      alert('فشل الجدولة: ' + r.error);
    }
    SCHED_STATE.loading = false;
    render();
  });

  document.getElementById('btnRefreshSched')?.addEventListener('click', async ()=>{
    await loadScheduledList(); render();
  });

  document.getElementById('btnDeleteAll')?.addEventListener('click', async ()=>{
    if(!confirm('حذف كل التغريدات المنتظرة؟')) return;
    await window.api.deleteAllScheduled();
    await loadScheduledList(); render();
  });
}

async function loadScheduledList(){
  SCHED_STATE.scheduled = await window.api.getScheduled();
  updateDueCount();
}

// ── مخطط المحتوى: منشورات اليوم ──────────────────
let DUE_COUNT = 0;
let POSTING_ID = null;

function getDueItems(){
  // المستحق = حان وقته فعلاً (موعده <= الآن) — لا يشمل ساعات اليوم القادمة
  const now = new Date();
  return SCHED_STATE.scheduled.filter(t => t.status==='pending' && new Date(t.scheduled_at) <= now);
}

function updateDueCount(){
  DUE_COUNT = getDueItems().length;
}

let DUE_REMINDER_SHOWN = false;

async function refreshDueCount(){
  try {
    SCHED_STATE.scheduled = await window.api.getScheduled();
    updateDueCount();
    renderHdr();

}

// اختيار تغريدات محددة من المحفوظات لإضافتها للمخطط
let PICKER_SEL = new Set();
function openSavedPicker(){
  PICKER_SEL = new Set();
  document.getElementById('savedPickPop')?.remove();
  const pop = document.createElement('div');
  pop.id = 'savedPickPop';
  pop.style.cssText = 'position:fixed;inset:0;background:#00000088;z-index:999;display:flex;align-items:center;justify-content:center';
  pop.innerHTML = `<div style="background:#111827;border:1px solid #1a2540;border-radius:16px;padding:22px;width:480px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column" onclick="event.stopPropagation()">
    <div style="font-size:14px;font-weight:700;margin-bottom:4px">💾 اختر من المحفوظات</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:12px">انقر على التغريدات التي تريد إضافتها للمخطط</div>
    <div id="pickList" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-p" style="flex:1" id="pickConfirm">إضافة المحدد (<span id="pickCount">0</span>)</button>
      <button class="btn btn-g" style="flex:1" onclick="document.getElementById('savedPickPop').remove()">إلغاء</button>
    </div>
  </div>`;
  pop.onclick = () => pop.remove();
  document.body.appendChild(pop);

  const list = pop.querySelector('#pickList');
  S.saved.forEach(sv => {
    const already = SCHED_STATE.tweets.includes(sv.text);
    const item = document.createElement('div');
    item.style.cssText = `background:#0a0f1a;border:1px solid ${already?'#1a254066':'#1a2540'};border-radius:9px;padding:10px 12px;font-size:12px;line-height:1.8;cursor:${already?'default':'pointer'};opacity:${already?'.45':'1'};display:flex;gap:10px;align-items:flex-start`;
    item.innerHTML = `<span class="pickbox" style="flex-shrink:0;width:18px;height:18px;border-radius:5px;border:1.5px solid #1d9bf0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;margin-top:2px"></span><span style="flex:1">${escHtml(sv.text.substring(0,140))}${sv.text.length>140?'...':''}${already?' <span style="color:#6b7280;font-size:10px">(مضافة)</span>':''}</span>`;
    if(!already){
      item.onclick = () => {
        if(PICKER_SEL.has(sv.id)){ PICKER_SEL.delete(sv.id); item.querySelector('.pickbox').textContent=''; item.style.borderColor='#1a2540'; }
        else { PICKER_SEL.add(sv.id); item.querySelector('.pickbox').textContent='✓'; item.querySelector('.pickbox').style.background='#1d9bf0'; item.style.borderColor='#1d9bf0'; }
        pop.querySelector('#pickCount').textContent = PICKER_SEL.size;
      };
    }
    list.appendChild(item);
  });

  pop.querySelector('#pickConfirm').onclick = () => {
    let added = 0;
    S.saved.forEach(sv => {
      if(PICKER_SEL.has(sv.id) && sv.text.length <= 280 && !SCHED_STATE.tweets.includes(sv.text)){
        SCHED_STATE.tweets.push(sv.text); added++;
      }
    });
    pop.remove();
    if(added) render();
  };
}

// تعديل موعد منشور مجدول عبر تقويم النظام (datetime-local)
function editSchedTime(id){
  const item = SCHED_STATE.scheduled.find(t=>t.id===id);
  if(!item) return;
  document.getElementById('timeEditPop')?.remove();
  const d = new Date(item.scheduled_at);
  const pad = n => String(n).padStart(2,'0');
  const localVal = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const pop = document.createElement('div');
  pop.id = 'timeEditPop';
  pop.style.cssText = 'position:fixed;inset:0;background:#00000088;z-index:999;display:flex;align-items:center;justify-content:center';
  pop.innerHTML = `<div style="background:#111827;border:1px solid #1a2540;border-radius:16px;padding:24px;width:330px" onclick="event.stopPropagation()">
    <div style="font-size:14px;font-weight:700;margin-bottom:6px">🕐 تعديل موعد النشر</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:14px">${escHtml(item.content.substring(0,60))}${item.content.length>60?'...':''}</div>
    <input type="datetime-local" id="newSchedTime" value="${localVal}" style="width:100%;color-scheme:dark">
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-p" style="flex:1" onclick="saveSchedTime(${id})">حفظ الموعد</button>
      <button class="btn btn-g" style="flex:1" onclick="document.getElementById('timeEditPop').remove()">إلغاء</button>
    </div>
  </div>`;
  pop.onclick = () => pop.remove();
  document.body.appendChild(pop);
}

async function saveSchedTime(id){
  const val = document.getElementById('newSchedTime')?.value;
  if(!val){ return; }
  const dt = new Date(val); // يُفسَّر بالتوقيت المحلي
  if(isNaN(dt)){ alert('موعد غير صالح'); return; }
  await window.api.updateScheduledTime({ id, scheduledAt: dt.toISOString() });
  document.getElementById('timeEditPop')?.remove();
  await loadScheduledList();
  render();
}

async function postNow(id){
  if(POSTING_ID) return;
  const item = SCHED_STATE.scheduled.find(t=>t.id===id);
  if(!item) return;
  POSTING_ID = id;
  render();
  let r;
  try {
    r = await window.api.postScheduled({ id, content: item.content });
  } catch(e) {
    r = { success: false, error: e.message || 'خطأ غير متوقع' };
  } finally {
    POSTING_ID = null; // يُصفّر دائماً مهما حدث — لا يبقى عالقاً
  }
  if(r && r.success){
    await loadScheduledList();
    render();
  } else {
    alert('فشل النشر: ' + ((r&&r.error)||'') + '\nالمنشور لا يزال في المخطط — حاول مرة أخرى.');
    render();
  }
}

async function deleteSched(id){
  await window.api.deleteScheduled(id);
  await loadScheduledList(); render();
}

      <button onclick="document.getElementById('updateBanner').remove()" style="background:transparent;border:1px solid #ffffff55;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer">لاحقاً</button>
    </div>`;
  document.querySelector('.hdr').after(banner);

  // زر التحديث — يبدأ التحميل داخل التطبيق

    document.getElementById('updateBannerActions').innerHTML = '<span style="color:#fff">⏳ جاري بدء التحميل...</span>';
    window.api.downloadUpdate();
  });

  // شريط التقدم
  window.api.onUpdateProgress(p => {
    const text = document.getElementById('updateBannerText');
    const actions = document.getElementById('updateBannerActions');
    if(text) text.innerHTML = `⬇️ جاري تحميل التحديث... ${p.percent}% (${p.speed} KB/s)`;
    if(actions) actions.innerHTML = `<div style="width:120px;height:8px;background:#ffffff33;border-radius:4px;overflow:hidden"><div style="width:${p.percent}%;height:100%;background:#fff;transition:width .3s"></div></div>`;
  });

  // اكتمل التحميل
  window.api.onUpdateDownloaded(() => {
    const text = document.getElementById('updateBannerText');
    const actions = document.getElementById('updateBannerActions');
    if(text) text.innerHTML = '✅ تم تحميل التحديث — جاهز للتثبيت';
    if(actions) actions.innerHTML = `<button onclick="window.api.installUpdate()" style="background:#00c896;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer">🔄 إعادة التشغيل والتثبيت</button>`;
  });

  // خطأ
  window.api.onUpdateError(e => {
    const text = document.getElementById('updateBannerText');
    if(text) text.innerHTML = '❌ فشل التحديث: ' + (e.error || 'خطأ غير معروف');
  });
}

function bindPaymentPage(){
  let selectedMethod = '';
  window.selectPayMethod = (method) => {
    selectedMethod = method;
    ['stc','urpay','bank'].forEach(m => document.getElementById('pm-'+m)?.classList.remove('sel'));
    document.getElementById('pm-'+method)?.classList.add('sel');
    const details = document.getElementById('payDetails');
    details.style.display = 'block';
    if(method === 'stc'){
      details.innerHTML = `<div style="color:#a78bfa;font-weight:600;margin-bottom:6px">📱 STC Pay</div>
        <div>ادفع على الرقم: <span style="color:#fff;font-weight:700;font-size:15px">${PAYMENT_INFO.stc}</span></div>
        <div style="color:#6b7280;margin-top:4px">المبلغ: <span style="color:#f59e0b;font-weight:700">${PAYMENT_INFO.price} ريال</span></div>`;
    } else if(method === 'urpay'){
      details.innerHTML = `<div style="color:#a78bfa;font-weight:600;margin-bottom:6px">💜 URPay</div>
        <div>ادفع على الرقم: <span style="color:#fff;font-weight:700;font-size:15px">${PAYMENT_INFO.urpay}</span></div>
        <div style="color:#6b7280;margin-top:4px">المبلغ: <span style="color:#f59e0b;font-weight:700">${PAYMENT_INFO.price} ريال</span></div>`;
    } else {
      details.innerHTML = `<div style="color:#a78bfa;font-weight:600;margin-bottom:6px">🏦 تحويل بنكي</div>
        <div style="margin-bottom:4px">رقم الحساب: <span style="color:#fff;font-weight:600">${PAYMENT_INFO.bank.account}</span></div>
        <div style="margin-bottom:4px">الآيبان: <span style="color:#fff;font-weight:600">${PAYMENT_INFO.bank.iban}</span></div>
        <div style="color:#6b7280">المبلغ: <span style="color:#f59e0b;font-weight:700">${PAYMENT_INFO.price} ريال</span></div>`;
    }
  };
  document.getElementById('btnSubmitOrder')?.addEventListener('click', () => {
    const name    = document.getElementById('payName')?.value?.trim();
    const phone   = document.getElementById('payPhone')?.value?.trim();
    const notes   = document.getElementById('payNotes')?.value?.trim();
    const errEl   = document.getElementById('payError');
    if(!name)         { errEl.style.color='#ff8080'; errEl.textContent='⚠️ أدخل اسمك الكامل'; return; }
    if(!phone)        { errEl.style.color='#ff8080'; errEl.textContent='⚠️ أدخل رقم جوالك'; return; }
    if(!selectedMethod){ errEl.style.color='#ff8080'; errEl.textContent='⚠️ اختر طريقة الدفع أولاً'; return; }
    const METHODS = { stc:'STC Pay', urpay:'URPay', bank:'تحويل بنكي' };
    const msg = buildOrderMsg({ name, phone, method: METHODS[selectedMethod], notes });
    openWhatsApp(msg);
    errEl.style.color = '#00c896';
    errEl.textContent = '✅ افتح واتساب — أرسل الرسالة ثم أرفق صورة الإيصال';
  });
}

// ── حفظ محلي ─────────────────────────────────────
function loadSaved(){
  try { S.saved = JSON.parse(localStorage.getItem('nashir_saved')||'[]'); } catch(e){ S.saved=[]; }
}
function saveTweet(text){
  S.saved.unshift({ id: Date.now(), text, date: new Date().toLocaleString('ar-SA') });
  localStorage.setItem('nashir_saved', JSON.stringify(S.saved.slice(0,50)));
}
function deleteSaved(id){
  S.saved = S.saved.filter(x=>x.id!==id);
  localStorage.setItem('nashir_saved', JSON.stringify(S.saved));
}

// ── Render ────────────────────────────────────────
function render(){
  renderHdr();
  const app=document.getElementById('app');
  if(!S.user){ app.innerHTML=renderConnect(); bindConnect(); return; }
  const sponsorBar = renderSponsorBar();
  if(S.page==='compose'){
    if(S.step===0){ app.innerHTML=sponsorBar+renderS0(); bindS0(); }
    else if(S.step===1){ app.innerHTML=renderS1(); bindS1(); }
    else if(S.step===2){ app.innerHTML=renderS2(); bindS2(); }
  } else if(S.page==='saved'){
    app.innerHTML=sponsorBar+renderSavedPage();
    bindSavedPage();
  } else if(S.page==='seo'){
    app.innerHTML=sponsorBar+renderSeoPage();
    bindSeoPage();
  } else if(S.page==='schedule'){
    loadScheduledList().then(()=>{ app.innerHTML=sponsorBar+renderSchedulePage(); bindSchedulePage(); });
    app.innerHTML='<div style="text-align:center;padding:40px;color:#6b7280"><span class="spin"></span> تحميل...</div>';
  } else if(S.page==='about'){
    app.innerHTML=sponsorBar+renderAboutPage();
  }
}

      const parts = [];
      if(S.selTrends.length) parts.push(S.selTrends.map(t=>t.name).join(' '));
      if((S.customTags||'').trim()) parts.push(S.customTags.trim());
      const tags = parts.join(' ').trim();

        if(candidate.length <= 280) S.tweet = candidate;

    S.afUrl = url;

    if(r.success){
      if(S.prodImages.length < 4) S.prodImages.push(r.imageUrl);
      if(r.pageTitle && !S.prodDesc) S.prodDesc = r.pageTitle.substring(0,80);
    } else {
      alert('لم يتم العثور على صورة — يمكنك رفع صورة يدوياً');
    }

    if(currentDesc) S.prodDesc = currentDesc;
    btn.disabled=false; btn.textContent='🖼️ جلب صورة';
    render();
  });
  // FIX #2: رفع صورة بدون مسح الرابط والوصف
  document.getElementById('imgUpload')?.addEventListener('change', (e)=>{
    // احفظ قيم الحقول قبل render
    S.afUrl = document.getElementById('afUrl')?.value || S.afUrl;
    S.prodDesc = document.getElementById('prodDesc')?.value || S.prodDesc;
    const files = Array.from(e.target.files || []);
    files.forEach(file => {
      if(S.prodImages.length >= 4) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        S.prodImages.push(ev.target.result);
        render();
      };
      reader.readAsDataURL(file);
    });
  });
}

async function fetchTrends(){
  const btn=document.getElementById('btnFetch');
  btn.disabled=true; btn.textContent='⏳ جاري الجلب...';
  S.trends=[]; S.trendsReal=false; S.trendsError='';
  try {
    const r=await window.api.fetchTrends({region:S.region, platform:S.platform});
    if(r.success && r.trends.length>0){ S.trends=r.trends; S.trendsReal=true; }
    else S.trendsError=r.error||'فشل جلب الترندات';
  } catch(e){ S.trendsError=e.message; }
  btn.disabled=false;
  render();
}

function toggleTrend(name){
  const t=S.trends.find(x=>x.name===name); if(!t) return;
  const i=S.selTrends.findIndex(x=>x.name===name);
  if(i>=0) S.selTrends.splice(i,1);
  else if(S.selTrends.length<3) S.selTrends.push(t);
  render();
}

async function fetchBs(){
  const searchInput=document.getElementById('prodSearch');
  const query=(searchInput?.value||S.prodSearch).trim();
  if(!query){ alert('اكتب اسم المنتج للبحث'); return; }
  S.prodSearch=query;
  const btn=document.getElementById('btnBs');
  btn.disabled=true; btn.textContent='⏳...';
  const r=await window.api.fetchBestsellers({source:S.bsSrc, query});
  if(r.success) S.products=r.products||[];
  else { S.products=[]; alert('⚠️ '+( r.error||'فشل البحث')); }
  btn.disabled=false; btn.textContent='🔍 بحث';
  render();
}

function selProd(i){
  const p=S.products[i]; if(!p) return;
  S.afUrl=p.url; S.prodDesc=p.name;
  // أزل كل الصور المسحوبة تلقائياً من المتجر سابقاً (نحتفظ بصور المستخدم اليدوية فقط)
  if(S.storeImages && S.storeImages.length){
    S.prodImages = S.prodImages.filter(im => !S.storeImages.includes(im));
  }
  S.storeImages = [];
  if(p.image && S.prodImages.length < 4 && !S.prodImages.includes(p.image)){
    S.prodImages.push(p.image);
    S.storeImages.push(p.image); // تتبّع لاستبدالها عند اختيار منتج آخر
  }
  render();
}

async function genTweet(){
  const af=document.getElementById('afUrl')?.value?.trim();
  // الرابط اختياري — بدونه يتحول التوليد لوضع "التغريد العام"
  S.afUrl=af; S.prodDesc=document.getElementById('prodDesc')?.value?.trim()||'';
  const btn=document.getElementById('btnGen'), ld=document.getElementById('genLd');
  btn.disabled=true; if(ld) ld.style.display='block';
  const r=await window.api.generateTweet({trends:S.selTrends, affiliateUrl:S.mode==='marketing'?S.afUrl:'', productDesc:S.prodDesc, tone:S.tone, customTags:S.customTags, category:S.mode==='marketing'?S.category:'', noonCode:S.noonCode});
  if(r.success) S.tweet=r.tweet;
  btn.disabled=false; if(ld) ld.style.display='none';
  render();
}

function updCC(n){
  const el=document.querySelector('.tcc'), btn=document.getElementById('btnN1');
  if(el){ el.textContent=n+'/280'; el.style.color=n>280?'#ff4444':n>240?'#ff8800':'#00c896'; }
  if(btn) btn.disabled=n===0||n>280;
}

async function copyTweet(){
  try {
    await window.api.copyToClipboard(S.tweet);
    saveTweet(S.tweet);
    S.copySuccess=true; render();
  } catch(e){
    try { await navigator.clipboard.writeText(S.tweet); saveTweet(S.tweet); S.copySuccess=true; render(); }
    catch(e2){ alert('فشل النسخ: '+e2.message); }
  }
}

async function copySaved(text){
  try {
    // FIX #3: استخدام Electron clipboard بدل navigator.clipboard
    await window.api.copyToClipboard(text);
    const btn=event.target; btn.textContent='✅'; setTimeout(()=>btn.textContent='📋 نسخ',1500);
  } catch(e){
    // fallback
    try { await navigator.clipboard.writeText(text); }
    catch(e2){ alert('فشل النسخ: '+e2.message); }
  }
}

      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a2540">
        <span style="color:#6b7280">رقم النسخة</span>
        <span style="color:#1d9bf0;font-weight:700">v${APP_VER}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a2540">
        <span style="color:#6b7280">الاشتراك</span>
        <span style="font-weight:700">${(()=>{
          const u = S.user || {};
          if(u.plan === 'lifetime') return '<span style="color:#a78bfa">♾️ دائم</span>';
          if(u.updates_until){
            const d = new Date(u.updates_until);
            const days = Math.ceil((d - new Date())/(24*60*60*1000));
            const dateStr = d.toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'});
            if(days < 0) return '<span style="color:#ff6b6b">منتهٍ — جدّد للاستمرار</span>';
            const color = days <= 14 ? '#f59e0b' : '#00c896';
            return `<span style="color:${color}">ساري حتى ${dateStr} (${days} يوم)</span>`;
          }
          return '<span style="color:#00c896">نشط</span>';
        })()}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a2540">
        <span style="color:#6b7280">التطوير</span>
        <span style="color:#e8eaf0;font-weight:600">د. فيصل الفجري</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a2540">
        <span style="color:#6b7280">الدعم الفني</span>
        <span style="color:#25D366;font-weight:600;cursor:pointer" onclick="openWhatsApp(SUPPORT_MSG_HELP)">0559099222</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;align-items:center">
        <span style="color:#6b7280">كود خصم نون</span>
        <span onclick="copyNoonCode()" id="noonCodeBox" style="color:#f59e0b;font-weight:800;cursor:pointer;background:#f59e0b15;border:1px dashed #f59e0b55;border-radius:8px;padding:4px 14px;letter-spacing:1px" title="اضغط للنسخ">FAI16 📋</span>
      </div>
    </div>
    <div style="font-size:11px;color:#6b7280;margin-top:10px;text-align:center">💡 استخدم كود <strong style="color:#f59e0b">FAI16</strong> للحصول على خصم عند الشراء من نون</div>

    <button class="btn btn-g" id="btnManualUpdate" onclick="manualUpdateCheck()" style="margin-top:16px;font-size:13px">🔄 تحقق من التحديث الآن</button>
    <div id="updateCheckStatus" style="font-size:12px;color:#6b7280;margin-top:8px"></div>

    <button class="btn btn-g" onclick="runImageDiagnostic()" style="margin-top:10px;font-size:12px;opacity:.7">🔧 فحص صور المتاجر (للدعم الفني)</button>
    <div id="diagResult" style="display:none;margin-top:10px;background:#0a0f1a;border:1px solid #1a2540;border-radius:10px;padding:12px;text-align:left;direction:ltr;font-family:monospace;font-size:10px;color:#9fb0c8;white-space:pre-wrap;max-height:300px;overflow:auto;user-select:all"></div>

    ${SPONSOR.enabled ? `
    <div class="card" style="margin-top:16px;border-color:#f59e0b33;cursor:pointer" onclick="window.api.openExternal(SPONSOR.url)">
      <div style="font-size:10px;color:#f59e0b;font-weight:700;margin-bottom:8px">⭐ برعاية</div>
      <div style="display:flex;align-items:center;gap:12px;justify-content:center">
        ${SPONSOR.logo ? `<img src="${SPONSOR.logo}" style="width:40px;height:40px;border-radius:8px;object-fit:cover">` : ''}
        <div style="text-align:right">
          <div style="font-size:15px;font-weight:700;color:#fff">${SPONSOR.name}</div>
          <div style="font-size:11px;color:#6b7280">${SPONSOR.tagline}</div>
        </div>
      </div>
    </div>` : `
    <div class="card" style="margin-top:16px;border:1px dashed #f59e0b44;background:linear-gradient(135deg,#f59e0b08,transparent);cursor:pointer" onclick="openXDM()">
      <div style="font-size:10px;color:#f59e0b;font-weight:700;letter-spacing:1px;margin-bottom:8px">⭐ شريك النجاح</div>
      <div style="font-size:13px;color:#e0e0e0;font-weight:600;margin-bottom:4px">هذه المساحة محجوزة لعلامة مميزة</div>
      <div style="font-size:11px;color:#6b7280;line-height:1.9">علامتك أمام جمهور من المغردين وصنّاع المحتوى والمسوقين — يومياً، داخل أداة عملهم. <span style="color:#1d9bf0">للرعاية: راسلنا خاص إكس ↗</span></div>
    </div>`}

    <div style="font-size:11px;color:#3a4456;margin-top:20px">© ${new Date().getFullYear()} ناشر — جميع الحقوق محفوظة</div>
  </div>`;
}

window.runImageDiagnostic = async () => {
  const box = document.getElementById('diagResult');
  if(box){ box.style.display='block'; box.textContent='⏳ جاري الفحص... قد يأخذ دقيقة، انتظر.'; }
  try {
    const r = await window.api.diagnoseImages();
    if(box){ box.textContent = JSON.stringify(r, null, 2); }
  } catch(e) {
    if(box){ box.textContent = 'خطأ: ' + (e.message||e); }
  }
};

window.manualUpdateCheck = async () => {
  const el = document.getElementById('updateCheckStatus');
  const btn = document.getElementById('btnManualUpdate');
  if(btn) btn.disabled = true;
  if(el) el.textContent = '⏳ جاري التحقق من GitHub...';
  let answered = false;
  const done = (msg, color) => { answered = true; if(el){ el.textContent = msg; el.style.color = color||'#6b7280'; } if(btn) btn.disabled = false; };
  // سجّل المستمعات مرة واحدة فقط طوال الجلسة (يمنع تكدّسها مع كل ضغطة)
  if(!window.__updListeners){
    window.__updListeners = true;
    window.api.onUpdateAvailable(d => { if(window.__updPending){ window.__updPending(); window.__updPending=null; } });
    window.api.onUpdateNotAvail(() => { if(window.__updDone){ window.__updDone(`✅ أنت على أحدث نسخة (v${APP_VER})`,'#00c896'); } });
    window.api.onUpdateError(d => { if(window.__updDone){ window.__updDone('⚠️ تعذر التحقق: ' + (d.error||''), '#f59e0b'); } });
  }
  window.__updPending = () => done('🆕 يوجد إصدار جديد — سيظهر شريط التحديث بالأعلى', '#00c896');
  window.__updDone = (m,c) => { if(!answered) done(m,c); };
  try { await window.api.checkUpdate(); } catch(e) {}
  setTimeout(()=>{ if(!answered) done('⚠️ لم يصل رد — تحقق من الإنترنت أو أن آخر إصدار منشور في GitHub Releases', '#f59e0b'); }, 15000);
};

window.copyNoonCode = async () => {
  await window.api.copyToClipboard('FAI16');
  const box = document.getElementById('noonCodeBox');
  if(box){ const orig = box.innerHTML; box.innerHTML = '✅ تم النسخ'; setTimeout(()=>{ box.innerHTML = orig; }, 1500); }
};

function resetW(){ S.step=0; S.selTrends=[]; S.tweet=''; S.afUrl=''; S.prodDesc=''; S.prodImages=[]; S.copySuccess=false; S.postResult=null; render(); }
function switchMode(m){
  if(S.mode===m) return;
  S.mode=m; S.tweet='';
  if(m!=='marketing'){ S.afUrl=''; S.products=[]; S.prodSearch=''; S.category=''; }
  if(m==='free'){ S.prodImages=[]; S.prodDesc=''; }
  render();
}
function toggleTrendIdx(i){ const t=S.trends[i]; if(t) toggleTrend(t.name); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/\n/g,'\\n'); }

init();
</script>
</body>
</html>
