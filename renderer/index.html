<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ناشر</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070b14;color:#e8eaf0;font-family:'Segoe UI',Tahoma,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#0d1421;border-bottom:1px solid #1d9bf033;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1d9bf0,#0a4a8a);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-t{font-size:17px;font-weight:700;color:#fff}
.logo-s{font-size:10px;color:#1d9bf0}
.steps{display:flex;gap:5px}
.sp{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a2540;color:#6b7280;cursor:default}
.sp.active{background:#1d9bf0;border-color:#1d9bf0;color:#fff}
.sp.done{border-color:#1d9bf055;color:#1d9bf0;cursor:pointer}
.sp-n{width:16px;height:16px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;background:#222;color:#6b7280;flex-shrink:0}
.sp.active .sp-n{background:#fff;color:#1d9bf0}
.sp.done .sp-n{background:#1d9bf0;color:#fff}
.hdr-r{display:flex;align-items:center;gap:8px}
.ubadge{display:flex;align-items:center;gap:7px;padding:5px 12px;background:#111827;border:1px solid #1d9bf033;border-radius:20px}
.uname{font-size:12px;color:#aaa}
.main{flex:1;overflow-y:auto;padding:24px 20px 40px;max-width:860px;margin:0 auto;width:100%}
.cs{display:flex;flex-direction:column;align-items:center;justify-content:center;height:65vh;text-align:center;gap:16px}
.cs-ic{font-size:72px}
.cs-t{font-size:26px;font-weight:700;color:#fff}
.cs-s{font-size:14px;color:#6b7280;max-width:360px;line-height:1.7}
.btn{width:100%;padding:12px;border:none;border-radius:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-p{background:linear-gradient(135deg,#1d9bf0,#0d6efd)}
.btn-p:hover:not(:disabled){transform:translateY(-1px)}
.btn-pu{background:linear-gradient(135deg,#7c3aed,#1d9bf0)}
.btn-g{background:#111827;border:1px solid #1a2540;color:#6b7280}
.btn-big{padding:14px 36px;width:auto;border-radius:14px;font-size:16px;background:linear-gradient(135deg,#1d9bf0,#0d6efd);border:none;color:#fff;cursor:pointer;font-family:inherit;font-weight:700}
.btn-sm{padding:6px 14px;width:auto;border-radius:8px;font-size:12px}
.btn-copy{background:linear-gradient(135deg,#00c896,#0d9488);font-size:15px;padding:14px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.card{background:#111827;border:1px solid #1a2540;border-radius:14px;padding:20px;margin-bottom:16px}
.ct{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:14px}
label{display:block;font-size:13px;color:#9aa;margin-bottom:5px;font-weight:500}
input,textarea{width:100%;padding:10px 13px;background:#0a0f1a;border:1px solid #1a2540;border-radius:9px;color:#e8eaf0;font-size:13px;outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:#1d9bf0}
.f{margin-bottom:14px}
.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #1a2540;color:#6b7280;cursor:pointer;background:transparent;font-family:inherit}
.tab.active{background:#1d9bf0;border-color:#1d9bf0;color:#fff}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.tc{padding:12px 14px;border-radius:11px;cursor:pointer;background:#0d1421;border:2px solid #1a2540;transition:all .2s}
.tc:hover{border-color:#1d9bf033}
.tc.sel{background:#0c2d4a;border-color:#1d9bf0}
.tn{font-size:13px;font-weight:700;color:#ccd}
.tc.sel .tn{color:#1d9bf0}
.tv{font-size:11px;color:#6b7280;margin-top:2px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pc{padding:10px 12px;border-radius:10px;cursor:pointer;background:#0d1421;border:2px solid #1a2540;transition:all .2s}
.pc:hover{border-color:#1d9bf033}
.pc.sel{border-color:#1d9bf0;background:#0c2d4a}
.pn{font-size:12px;font-weight:600;color:#e0e0e0;line-height:1.4}
.pm{font-size:11px;color:#6b7280;margin-top:3px}
.tones{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tone{padding:9px 12px;border-radius:9px;font-size:13px;background:#0d1421;border:2px solid #1a2540;color:#6b7280;cursor:pointer;font-family:inherit;text-align:center}
.tone.active{background:#1d9bf011;border-color:#1d9bf0;color:#1d9bf0;font-weight:600}
.tbox{background:#0a0f1a;border:1px solid #1d9bf033;border-radius:11px;padding:13px;margin-bottom:12px}
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tlbl{font-size:12px;color:#1d9bf0;font-weight:600}
.tcc{font-size:11px;font-weight:700}
.lbar{width:100%;height:3px;background:#1a2540;border-radius:2px;overflow:hidden;margin-top:8px}
.lfill{height:100%;background:linear-gradient(90deg,#7c3aed,#1d9bf0);animation:sl 1.4s infinite;width:35%}
@keyframes sl{0%{transform:translateX(-200%)}100%{transform:translateX(500%)}}
.ptit{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.psub{font-size:13px;color:#6b7280;margin-bottom:20px}
.sched-table{width:100%;border-collapse:collapse;font-size:12px}
.sched-table th{text-align:right;padding:8px 10px;color:#6b7280;border-bottom:1px solid #1a2540;font-weight:600}
.sched-table td{padding:9px 10px;border-bottom:1px solid #0d1421;vertical-align:top}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.badge-saved{background:#7c3aed22;color:#a78bfa}
.char-warn{background:#ff44440d;border:1px solid #ff444433;border-radius:9px;padding:10px 13px;font-size:12px;color:#ff8080;margin-bottom:10px}
.char-ok{background:#00c8960d;border:1px solid #00c89633;border-radius:9px;padding:8px 13px;font-size:12px;color:#00c896}
.real-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;background:#00c89622;color:#00c896;border:1px solid #00c89633;margin-right:6px}
.err-box{background:#ff44440d;border:1px solid #ff444433;border-radius:9px;padding:14px;font-size:12px;color:#ff8080;margin-bottom:14px;line-height:1.8}
.succ-copy{text-align:center;padding:40px 20px}
.succ-ic{font-size:60px;margin-bottom:14px}
.succ-t{font-size:20px;color:#00c896;font-weight:700;margin-bottom:6px}
.succ-b{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.saved-card{background:#0d1421;border:1px solid #1a2540;border-radius:11px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.saved-text{font-size:13px;line-height:1.7;flex:1;white-space:pre-wrap;word-break:break-word}
.saved-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #ffffff33;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* toggle switch */
.tog{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .2s,right .2s}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <div class="logo-ic">✈️</div>
    <div><div class="logo-t">ناشر</div><div class="logo-s">النشر الذكي على منصات التواصل</div></div>
  </div>
  <div class="steps" id="steps"></div>
  <div class="hdr-r" id="hdrR"></div>
</div>
<div class="main" id="app"></div>

<script>
const S={
  user:null, step:0, page:'compose',
  region:'sa', platform:'x', trends:[], selTrends:[], trendsReal:false, trendsError:'',
  fixedTags:true,
  bsSrc:'amazon', products:[], prodSearch:'',
  afUrl:'', prodDesc:'', prodImages:[], tone:'hype', category:'',
  tweet:'', saved:[],
  copySuccess:false,
};

const REGIONS=[{k:'sa',l:'🇸🇦 السعودية'},{k:'world',l:'🌍 العالم'},{k:'ae',l:'🇦🇪 الإمارات'},{k:'eg',l:'🇪🇬 مصر'}];
const TONES=[{id:'hype',l:'🔥 إثارة'},{id:'informative',l:'📊 معلوماتي'},{id:'funny',l:'😂 فكاهي'},{id:'urgency',l:'⚡ عاجل'}];
const STEPS=['الترندات','التغريدة','الحفظ'];
const SRCS=[{k:'amazon',l:'📦 أمازون'},{k:'noon',l:'🛍️ نون'},{k:'aliexpress',l:'🌐 علي إكسبريس'}];

const SUPPORT_WHATSAPP = '966559099222';
const SUPPORT_MSG_BUY  = 'مرحباً، أريد شراء برنامج ناشر 🚀';
const SUPPORT_MSG_HELP = 'مرحباً، أحتاج مساعدة في برنامج ناشر';
const PAYMENT_INFO = {
  stc:   '0500043462',
  urpay: '0500043462',
  bank:  { iban: 'SA7980000044060801614001', account: '44000000100060861400012' },
  price: 99,
};

// FIX #4: واتساب وX يفتحان في المتصفح الخارجي
function openWhatsApp(msg){ window.api.openExternal(`https://wa.me/${SUPPORT_WHATSAPP}?text=${encodeURIComponent(msg)}`); }
function openX(){ window.api.openExternal('https://twitter.com/intent/tweet'); }
function openXWith(text){ window.api.openExternal('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)); }

function buildOrderMsg(data){
  return `🛒 طلب شراء — ناشر\n\n` +
    `الاسم: ${data.name}\n` +
    `الجوال: ${data.phone}\n` +
    `طريقة الدفع: ${data.method}\n` +
    `المبلغ: 99 ريال\n` +
    `${data.notes ? 'ملاحظات: ' + data.notes + '\n' : ''}` +
    `\n⬇️ سأرفق صورة الإيصال في الرسالة التالية`;
}


async function init(){
  // أولاً: تحقق من الترخيص
  const lic = await window.api.checkLicense();
  if (!lic.valid) {
    document.getElementById('app').innerHTML = renderLicense();
    bindLicense();
    renderHdr();
    return;
  }
  S.user = await window.api.getAuth();
  window.api.onAuthSuccess(u=>{ S.user=u; render(); });
  window.api.onAuthError(e=>{ alert('خطأ في الربط: '+e); render(); });
  // استقبال إشعار التحديث
  window.api.onUpdateAvailable(data => { S.updateAvailable=data; showUpdateBanner(data); });
  loadSaved();
  render();
}

function renderLicense(){
  return `<div class="cs">
    <div class="cs-ic">✈️</div>
    <div class="cs-t">ناشر</div>
    <div class="cs-s">أداة التسويق بالعمولة الذكية على X</div>
    <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px">
      <input id="licInput" placeholder="XXXXX-XXXXX-XXXXX" style="text-align:center;font-size:16px;letter-spacing:2px;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
      <button class="btn-big" id="btnActivate" style="width:100%">✅ تفعيل الكود</button>
      <div id="licError" style="color:#ff8080;font-size:13px;text-align:center"></div>
      <div style="border-top:1px solid #1a2540;margin:4px 0"></div>
      <button class="btn-big" style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706)" onclick="showPaymentPage()">
        🛒 اشترك الآن — 99 ريال/سنة
      </button>
      <button class="btn btn-g" style="width:100%;padding:11px" onclick="openWhatsApp(SUPPORT_MSG_HELP)">
        💬 الدعم الفني — 0559099222
      </button>
    </div>
  </div>`;
}
function bindLicense(){
  document.getElementById('btnActivate')?.addEventListener('click', activateLicense);
  document.getElementById('licInput')?.addEventListener('keydown', e=>{ if(e.key==='Enter') activateLicense(); });
}
async function activateLicense(){
  const code = document.getElementById('licInput')?.value?.trim();
  if (!code) return;
  const btn = document.getElementById('btnActivate');
  const err = document.getElementById('licError');
  btn.disabled=true; btn.textContent='⏳ جاري التحقق...';
  err.textContent='';
  const result = await window.api.verifyLicense(code);
  if (result.valid) {
    btn.textContent='✅ تم التفعيل!';
    setTimeout(()=>{ S.licensed=true; init(); }, 800);
  } else {
    err.textContent = '❌ ' + (result.error || 'كود غير صحيح');
    btn.disabled=false; btn.textContent='✅ تفعيل';
  }
}

// ── صفحة SEO يوتيوب ──────────────────────────────
const SEO_STATE = { title:'', trends:[], result:null, loading:false, copied:false };

function renderSeoPage(){
  const r = SEO_STATE.result;
  return `<div class="ptit">📈 SEO يوتيوب</div>
  <div class="psub">اكتب عنوان المنتج واختر ترنداً لتوليد محتوى SEO محسّن</div>

  <div class="card">
    <div class="ct">🎯 عنوان المنتج أو الفيديو</div>
    <div class="f">
      <input id="seoTitle" placeholder="مثل: سماعات AirPods Pro لاسلكية بتخفيض 40%" value="${SEO_STATE.title}">
    </div>
  </div>

  <div class="card">
    <div class="ct">📱 جلب ترندات يوتيوب للإلهام</div>
    <div class="tabs">
      ${[{k:'sa',l:'🇸🇦 السعودية'},{k:'ae',l:'🇦🇪 الإمارات'},{k:'eg',l:'🇪🇬 مصر'},{k:'world',l:'🌍 العالم'}]
        .map(r=>`<button class="tab ${S.region===r.k?'active':''}" onclick="S.region='${r.k}'">${r.l}</button>`).join('')}
    </div>
    <button class="btn btn-g" id="btnSeoTrends" style="width:auto;padding:8px 18px;font-size:13px">▶️ جلب ترندات يوتيوب</button>
    ${SEO_STATE.trends.length ? `
    <div style="margin-top:12px">
      <div style="font-size:12px;color:#6b7280;margin-bottom:8px">اختر ترنداً لإضافته للعنوان (اختياري):</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">
        ${SEO_STATE.trends.map((t,i)=>`
          <span onclick="addTrendToTitle(${i})" style="padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #1a2540;background:#0d1421;color:#aaa;transition:all .2s"
            onmouseover="this.style.borderColor='#1d9bf0';this.style.color='#1d9bf0'"
            onmouseout="this.style.borderColor='#1a2540';this.style.color='#aaa'">
            ${t.title || t.name}
          </span>`).join('')}
      </div>
    </div>` : ''}
  </div>

  <button class="btn btn-pu" id="btnGenSeo" style="margin-bottom:16px;font-size:15px;padding:13px" ${SEO_STATE.loading?'disabled':''}>
    ${SEO_STATE.loading ? '<span class="spin"></span> جاري التوليد...' : '✨ توليد محتوى SEO'}
  </button>

  ${r ? `
  <div class="card">
    <div class="ct">📋 النتيجة — انقر على أي قسم لنسخه</div>

    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:#1d9bf0;font-weight:600;margin-bottom:6px">🏷️ العنوان المحسّن (SEO Title)</div>
      <div onclick="copySection('seoResTitle')" id="seoResTitle" style="background:#0a0f1a;border:1px solid #1a2540;border-radius:9px;padding:12px;font-size:14px;cursor:pointer;transition:border-color .2s" onmouseover="this.style.borderColor='#1d9bf0'" onmouseout="this.style.borderColor='#1a2540'">
        ${escHtml(r.title)}
      </div>
    </div>

    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:#1d9bf0;font-weight:600;margin-bottom:6px">📝 الوصف (Description)</div>
      <div onclick="copySection('seoResDesc')" id="seoResDesc" style="background:#0a0f1a;border:1px solid #1a2540;border-radius:9px;padding:12px;font-size:13px;line-height:1.8;cursor:pointer;white-space:pre-wrap;transition:border-color .2s" onmouseover="this.style.borderColor='#1d9bf0'" onmouseout="this.style.borderColor='#1a2540'">
        ${escHtml(r.description)}
      </div>
    </div>

    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:#1d9bf0;font-weight:600;margin-bottom:6px">🏷️ الهاشتاقات والكلمات المفتاحية</div>
      <div onclick="copySection('seoResTags')" id="seoResTags" style="background:#0a0f1a;border:1px solid #1a2540;border-radius:9px;padding:12px;font-size:13px;cursor:pointer;transition:border-color .2s" onmouseover="this.style.borderColor='#1d9bf0'" onmouseout="this.style.borderColor='#1a2540'">
        ${escHtml(r.tags)}
      </div>
    </div>

    <button class="btn btn-p" onclick="copyAllSeo()" style="font-size:13px;padding:11px">📋 نسخ الكل</button>
  </div>` : ''}`;
}

function bindSeoPage(){
  document.getElementById('seoTitle')?.addEventListener('input', e => SEO_STATE.title = e.target.value);
  document.getElementById('btnSeoTrends')?.addEventListener('click', async () => {
    const btn = document.getElementById('btnSeoTrends');
    btn.disabled=true; btn.textContent='⏳...';
    const r = await window.api.fetchTrends({ region: S.region, platform: 'youtube' });
    if(r.success) SEO_STATE.trends = r.trends;
    btn.disabled=false; btn.textContent='▶️ جلب ترندات يوتيوب';
    render();
  });
  document.getElementById('btnGenSeo')?.addEventListener('click', generateSeo);
}

window.addTrendToTitle = (i) => {
  const t = SEO_STATE.trends[i];
  if(!t) return;
  const titleEl = document.getElementById('seoTitle');
  const add = t.title || t.name.replace('#','');
  SEO_STATE.title = (SEO_STATE.title + ' ' + add).trim();
  if(titleEl) titleEl.value = SEO_STATE.title;
};

async function generateSeo(){
  const title = document.getElementById('seoTitle')?.value?.trim() || SEO_STATE.title;
  if(!title){ alert('أدخل عنوان المنتج أولاً'); return; }
  SEO_STATE.title = title;
  SEO_STATE.loading = true;
  render();

  // توليد SEO محلياً بدون API
  const trendNames = SEO_STATE.trends.slice(0,5).map(t => t.title || t.name.replace('#','')).join('، ');

  const CATEGORIES_AR = { electronics:'إلكترونيات', fashion:'موضة', food:'طعام', beauty:'جمال وعناية', home:'منزل وديكور' };
  const cat = CATEGORIES_AR[S.category] || 'منتجات';

  // عنوان SEO محسّن
  const seoTitle = `${title} | أفضل سعر 2025 | تسوق الآن`;

  // وصف محسّن
  const desc = `🔥 ${title}\n\n` +
    `هل تبحث عن ${title}؟ وجدنا لك أفضل عرض متاح الآن بسعر لا يُصدق!\n\n` +
    `✅ جودة عالية مضمونة\n` +
    `✅ شحن سريع لجميع المناطق\n` +
    `✅ أفضل سعر في السوق\n` +
    `✅ ضمان وإرجاع مجاني\n\n` +
    `${trendNames ? `🔗 مرتبط بـ: ${trendNames}\n\n` : ''}` +
    `لا تفوت هذا العرض — الكمية محدودة! 🚨`;

  // هاشتاقات وكلمات مفتاحية
  const baseKeywords = title.split(' ').filter(w => w.length > 2).map(w => `#${w}`).join(' ');
  const tags = `${baseKeywords} #${cat} #تسوق #عروض #تخفيضات #أفضل_سعر #تسوق_اونلاين #السعودية #فيصل_يختار`;

  SEO_STATE.result = { title: seoTitle, description: desc, tags };
  SEO_STATE.loading = false;
  render();
}

window.copySection = async (id) => {
  const el = document.getElementById(id);
  if(!el) return;
  const text = el.innerText;
  await window.api.copyToClipboard(text);
  el.style.borderColor = '#00c896';
  el.style.background = '#00c89608';
  setTimeout(()=>{ el.style.borderColor='#1a2540'; el.style.background='#0a0f1a'; }, 1500);
};

async function copyAllSeo(){
  const r = SEO_STATE.result;
  if(!r) return;
  const all = `العنوان:\n${r.title}\n\nالوصف:\n${r.description}\n\nالهاشتاقات:\n${r.tags}`;
  await window.api.copyToClipboard(all);
  alert('✅ تم نسخ كل المحتوى');
}


function showUpdateBanner(data){
  // إزالة أي banner قديم
  document.getElementById('updateBanner')?.remove();
  const banner = document.createElement('div');
  banner.id = 'updateBanner';
  banner.style.cssText = 'background:linear-gradient(135deg,#7c3aed,#1d9bf0);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-size:13px;flex-shrink:0';
  banner.innerHTML = `

function bindPaymentPage(){
  let selectedMethod = '';
  window.selectPayMethod = (method) => {
    selectedMethod = method;
    ['stc','urpay','bank'].forEach(m => document.getElementById('pm-'+m)?.classList.remove('sel'));
    document.getElementById('pm-'+method)?.classList.add('sel');
    const details = document.getElementById('payDetails');
    details.style.display = 'block';
    if(method === 'stc'){
      details.innerHTML = `<div style="color:#a78bfa;font-weight:600;margin-bottom:6px">📱 STC Pay</div>
        <div>ادفع على الرقم: <span style="color:#fff;font-weight:700;font-size:15px">${PAYMENT_INFO.stc}</span></div>
        <div style="color:#6b7280;margin-top:4px">المبلغ: <span style="color:#f59e0b;font-weight:700">99 ريال</span></div>`;
    } else if(method === 'urpay'){
      details.innerHTML = `<div style="color:#a78bfa;font-weight:600;margin-bottom:6px">💜 URPay</div>
        <div>ادفع على الرقم: <span style="color:#fff;font-weight:700;font-size:15px">${PAYMENT_INFO.urpay}</span></div>
        <div style="color:#6b7280;margin-top:4px">المبلغ: <span style="color:#f59e0b;font-weight:700">99 ريال</span></div>`;
    } else {
      details.innerHTML = `<div style="color:#a78bfa;font-weight:600;margin-bottom:6px">🏦 تحويل بنكي</div>
        <div style="margin-bottom:4px">رقم الحساب: <span style="color:#fff;font-weight:600">${PAYMENT_INFO.bank.account}</span></div>
        <div style="margin-bottom:4px">الآيبان: <span style="color:#fff;font-weight:600">${PAYMENT_INFO.bank.iban}</span></div>
        <div style="color:#6b7280">المبلغ: <span style="color:#f59e0b;font-weight:700">99 ريال</span></div>`;
    }
  };
  document.getElementById('btnSubmitOrder')?.addEventListener('click', () => {
    const name    = document.getElementById('payName')?.value?.trim();
    const phone   = document.getElementById('payPhone')?.value?.trim();
    const notes   = document.getElementById('payNotes')?.value?.trim();
    const errEl   = document.getElementById('payError');
    if(!name)         { errEl.style.color='#ff8080'; errEl.textContent='⚠️ أدخل اسمك الكامل'; return; }
    if(!phone)        { errEl.style.color='#ff8080'; errEl.textContent='⚠️ أدخل رقم جوالك'; return; }
    if(!selectedMethod){ errEl.style.color='#ff8080'; errEl.textContent='⚠️ اختر طريقة الدفع أولاً'; return; }
    const METHODS = { stc:'STC Pay', urpay:'URPay', bank:'تحويل بنكي' };
    const msg = buildOrderMsg({ name, phone, method: METHODS[selectedMethod], notes });
    openWhatsApp(msg);
    errEl.style.color = '#00c896';
    errEl.textContent = '✅ افتح واتساب — أرسل الرسالة ثم أرفق صورة الإيصال';
  });
}

function loadSaved(){
  try { S.saved = JSON.parse(localStorage.getItem('nashir_saved')||'[]'); } catch(e){ S.saved=[]; }
}
function saveTweet(text){
  S.saved.unshift({ id: Date.now(), text, date: new Date().toLocaleString('ar-SA') });
  localStorage.setItem('nashir_saved', JSON.stringify(S.saved.slice(0,50)));
}
function deleteSaved(id){
  S.saved = S.saved.filter(x=>x.id!==id);
  localStorage.setItem('nashir_saved', JSON.stringify(S.saved));
}

// ── Render ────────────────────────────────────────
function render(){
  renderHdr();
  const app=document.getElementById('app');
  if(!S.user){ app.innerHTML=renderConnect(); bindConnect(); return; }
  if(S.page==='compose'){
    if(S.step===0){ app.innerHTML=renderS0(); bindS0(); }
    else if(S.step===1){ app.innerHTML=renderS1(); bindS1(); }
    else if(S.step===2){ app.innerHTML=renderS2(); bindS2(); }
  } else if(S.page==='saved'){
    app.innerHTML=renderSavedPage();
    bindSavedPage();
  } else if(S.page==='seo'){
    app.innerHTML=renderSeoPage();
    bindSeoPage();
  }
}

  });
  // FIX #2: رفع صورة بدون مسح الرابط والوصف
  document.getElementById('imgUpload')?.addEventListener('change', (e)=>{
    // احفظ قيم الحقول قبل render
    S.afUrl = document.getElementById('afUrl')?.value || S.afUrl;
    S.prodDesc = document.getElementById('prodDesc')?.value || S.prodDesc;
    const files = Array.from(e.target.files || []);
    files.forEach(file => {
      if(S.prodImages.length >= 4) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        S.prodImages.push(ev.target.result);
        render();
      };
      reader.readAsDataURL(file);
    });
  });
}

// ── الخطوة 2: حفظ ونسخ (بدل النشر) ─────────────
function renderS2(){
  if(S.copySuccess) return `<div class="succ-copy">
    <div class="succ-ic">📋</div>
    <div class="succ-t">تم النسخ! الصقها في X</div>
    <div style="font-size:12px;color:#6b7280;margin-bottom:20px">التغريدة جاهزة في الحافظة</div>
    <div class="succ-b">
      <button class="btn btn-p" style="width:auto;padding:10px 22px" onclick="resetW()">+ تغريدة جديدة</button>
      <button class="btn btn-g" style="width:auto;padding:10px 22px;background:#25D366;border-color:#25D366;color:#fff" onclick="openWhatsApp(S.tweet)">📲 إرسال لواتساب</button>
      <button class="btn btn-g" style="width:auto;padding:10px 22px" onclick="goPage('saved')">💾 المحفوظات</button>
      <button class="btn btn-g" style="width:auto;padding:10px 22px" onclick="openX()">فتح X ↗</button>
    </div>
  </div>`;

  const cc=S.tweet.length, overLimit=cc>280;
  return `<div class="ptit">حفظ ونسخ التغريدة</div>
  <div style="background:#0d1421;border:1px solid #1a2540;border-radius:12px;padding:16px;margin-bottom:16px">
    ${S.prodImages.length > 0 ? `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${S.prodImages.map(img=>`<img src="${img}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #1a2540">`).join('')}
    </div>` : ''}
    <div style="font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word">${escHtml(S.tweet)}</div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #1a2540;font-size:12px;color:${overLimit?'#ff4444':'#00c896'};font-weight:700">${cc}/280 حرف</div>
  </div>
  ${S.prodImages.length > 0 ? `<div style="font-size:11px;color:#6b7280;margin-bottom:12px;background:#1d9bf011;border:1px solid #1d9bf033;border-radius:8px;padding:8px 12px">💡 بعد النسخ افتح X والصق التغريدة ثم أضف الصور (${S.prodImages.length} صورة)</div>` : ''}
  ${overLimit?`<div class="char-warn">⚠️ التغريدة تتجاوز 280 حرفاً</div>`:''}
  <div style="display:flex;gap:10px;flex-direction:column">
    <button class="btn btn-copy" id="btnCopy" ${overLimit?'disabled':''}>📋 نسخ التغريدة للحافظة</button>
    <button class="btn btn-g" id="btnWA" style="background:#25D366;border-color:#25D366;color:#fff;font-size:14px;padding:12px" ${overLimit?'disabled':''}>📲 إرسال لواتساب الشخصي</button>
    <button class="btn btn-pu" id="btnSave" ${overLimit?'disabled':''}>💾 حفظ في المحفوظات</button>
    <div style="display:flex;gap:10px">
      <button class="btn btn-g" onclick="S.step=1;render()">← تعديل التغريدة</button>
  ${overLimit?`<div class="char-warn">⚠️ التغريدة تتجاوز 280 حرفاً</div>`:''}
  <div style="display:flex;gap:10px;flex-direction:column">
    <button class="btn btn-copy" id="btnCopy" ${overLimit?'disabled':''}>📋 نسخ التغريدة للحافظة</button>
    <button class="btn btn-g" id="btnWA" style="background:#25D366;border-color:#25D366;color:#fff;font-size:14px;padding:12px" ${overLimit?'disabled':''}>📲 إرسال لواتساب الشخصي</button>
    <button class="btn btn-pu" id="btnSave" ${overLimit?'disabled':''}>💾 حفظ في المحفوظات</button>
    <div style="display:flex;gap:10px">
      <button class="btn btn-g" onclick="S.step=1;render()">← تعديل التغريدة</button>
      <button class="btn btn-g" onclick="openX()">فتح X ↗</button>
    </div>
  </div>`;
}
function bindS2(){
  document.getElementById('btnCopy')?.addEventListener('click', copyTweet);
  document.getElementById('btnWA')?.addEventListener('click', ()=> openWhatsApp(S.tweet));
  document.getElementById('btnSave')?.addEventListener('click', ()=>{
    saveTweet(S.tweet);
    alert('✅ تم الحفظ في المحفوظات');
    render();
  });
}

// ── صفحة المحفوظات ───────────────────────────────
function renderSavedPage(){
  return `<div class="ptit">المحفوظات</div>
  <div class="psub">${S.saved.length} تغريدة محفوظة</div>
  ${S.saved.length===0?`<div class="card"><div style="text-align:center;color:#6b7280;padding:30px">لا توجد تغريدات محفوظة بعد</div></div>`:
  S.saved.map(t=>`<div class="saved-card">
    <div class="saved-text">${escHtml(t.text)}</div>
    <div class="saved-actions">
      <button class="btn btn-g btn-sm" onclick="copySaved('${escAttr(t.text)}')">📋 نسخ</button>
      <button class="btn btn-g btn-sm" style="background:#25D366;border-color:#25D366;color:#fff" onclick="openWhatsApp('${escAttr(t.text)}')">📲 واتساب</button>
      <button class="btn btn-g btn-sm" onclick="openXWith('${escAttr(t.text)}')">فتح X</button>
      <button class="btn btn-g btn-sm" style="color:#ff6b6b;border-color:#ff444433" onclick="deleteSavedItem(${t.id})">🗑️</button>
    </div>
  </div>`).join('')}`;
}
function bindSavedPage(){}

// ── Actions ──────────────────────────────────────
async function fetchTrends(){
  const btn=document.getElementById('btnFetch');
  btn.disabled=true; btn.textContent='⏳ جاري الجلب...';
  S.trends=[]; S.trendsReal=false; S.trendsError='';
  try {
    const r=await window.api.fetchTrends({region:S.region, platform:S.platform});
    if(r.success && r.trends.length>0){ S.trends=r.trends; S.trendsReal=true; }
    else S.trendsError=r.error||'فشل جلب الترندات';
  } catch(e){ S.trendsError=e.message; }
  btn.disabled=false;
  render();
}

function toggleTrend(name){
  const t=S.trends.find(x=>x.name===name); if(!t) return;
  const i=S.selTrends.findIndex(x=>x.name===name);
  if(i>=0) S.selTrends.splice(i,1);
  else if(S.selTrends.length<3) S.selTrends.push(t);
  render();
}

async function fetchBs(){
  const searchInput=document.getElementById('prodSearch');
  const query=(searchInput?.value||S.prodSearch).trim();
  if(!query){ alert('اكتب اسم المنتج للبحث'); return; }
  S.prodSearch=query;
  const btn=document.getElementById('btnBs');
  btn.disabled=true; btn.textContent='⏳...';
  const r=await window.api.fetchBestsellers({source:S.bsSrc, query});
  if(r.success) S.products=r.products||[];
  else { S.products=[]; alert('⚠️ '+( r.error||'فشل البحث')); }
  btn.disabled=false; btn.textContent='🔍 بحث';
  render();
}

function selProd(i){
  const p=S.products[i]; if(!p) return;
  S.afUrl=p.url; S.prodDesc=p.name; render();
}

async function genTweet(){
  const af=document.getElementById('afUrl')?.value?.trim();
  if(!af){ alert('أدخل رابط الأفلييت أولاً'); return; }
  S.afUrl=af; S.prodDesc=document.getElementById('prodDesc')?.value?.trim()||'';
  const btn=document.getElementById('btnGen'), ld=document.getElementById('genLd');
  btn.disabled=true; if(ld) ld.style.display='block';
  const r=await window.api.generateTweet({trends:S.selTrends, affiliateUrl:S.afUrl, productDesc:S.prodDesc, tone:S.tone, fixedTags:S.fixedTags, category:S.category});
  if(r.success) S.tweet=r.tweet;
  btn.disabled=false; if(ld) ld.style.display='none';
  render();
}

function updCC(n){
  const el=document.querySelector('.tcc'), btn=document.getElementById('btnN1');
  if(el){ el.textContent=n+'/280'; el.style.color=n>280?'#ff4444':n>240?'#ff8800':'#00c896'; }
  if(btn) btn.disabled=n===0||n>280;
}

async function copyTweet(){
  try {
    await window.api.copyToClipboard(S.tweet);
    saveTweet(S.tweet);
    S.copySuccess=true; render();
  } catch(e){
    try { await navigator.clipboard.writeText(S.tweet); saveTweet(S.tweet); S.copySuccess=true; render(); }
    catch(e2){ alert('فشل النسخ: '+e2.message); }
  }
}

async function copySaved(text){
  try {
    // FIX #3: استخدام Electron clipboard بدل navigator.clipboard
    await window.api.copyToClipboard(text);
    const btn=event.target; btn.textContent='✅'; setTimeout(()=>btn.textContent='📋 نسخ',1500);
  } catch(e){
    // fallback
    try { await navigator.clipboard.writeText(text); }
    catch(e2){ alert('فشل النسخ: '+e2.message); }
  }
}




function deleteSavedItem(id){ deleteSaved(id); render(); }

async function logout(){
  if(!confirm('هل تريد قطع الاتصال؟')) return;
  await window.api.logout();
  S.user=null; S.step=0; S.page='compose'; render();
}

function goStep(n){ S.step=n; render(); }
function goPage(p){ S.page=p; render(); }
function resetW(){ S.step=0; S.selTrends=[]; S.tweet=''; S.afUrl=''; S.prodDesc=''; S.prodImages=[]; S.copySuccess=false; render(); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/\n/g,'\\n'); }

init();
</script>
